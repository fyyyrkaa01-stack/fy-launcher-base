name: Auto Update Plugins Base

on:
  schedule:
    # Робот будет запускаться автоматически каждые 6 часов
    - cron: '0 */6 * * *'
  workflow_dispatch: # Позволяет запускать обновление кнопкой вручную

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests cloudscraper beautifulsoup4

    - name: Run parser script
      run: python update_base.py

    - name: Commit and Push changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add plugins.json
        git diff-index --quiet HEAD || (git commit -m "Авто-обновление базы плагинов [skip ci]" && git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main)
